<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Ice V220 (Perfect Workflow - Full Code)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main:#f0f4f8; --text-dark:#1e293b; --text-muted:#64748b; --card-bg:#ffffff;
            --primary:#0ea5e9; --primary-grad:linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            --success:#10b981; --success-grad:linear-gradient(135deg, #10b981 0%, #059669 100%);
            --danger:#ef4444; --danger-grad:linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            --warning:#f59e0b; --warning-grad:linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            --purple-grad:linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            --dark-grad:linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --shadow-sm:0 2px 10px rgba(0,0,0,0.03); --shadow-md:0 8px 20px rgba(0,0,0,0.06);
            --shadow-lg:0 12px 25px rgba(0,0,0,0.1); --radius-md:16px; --radius-lg:24px; --radius-pill:50px;
        }
        @media screen {
            body { font-family:'Sarabun', sans-serif; margin:0; padding:0; background:var(--bg-main); color:var(--text-dark); padding-bottom:100px; -webkit-font-smoothing:antialiased; }
            * { box-sizing:border-box; }
            .dashboard { position:sticky; top:0; z-index:1000; background:var(--dark-grad); color:white; padding:15px 10px; display:flex; justify-content:space-around; border-bottom-left-radius:20px; border-bottom-right-radius:20px; }
            .dash-item span { font-size:0.8rem; color:#cbd5e1; display:block; }
            .dash-item div { font-size:1.6rem; font-weight:900; color:#34d399; }
            .order-status-bar { background:#fffbeb; border:1px solid #fde68a; padding:10px; text-align:center; font-size:0.95rem; color:#d97706; font-weight:bold; display:flex; justify-content:space-around; border-radius:var(--radius-pill); margin:10px; }
            .nav-bar { display:flex; background:white; margin:0 10px 20px 10px; border-radius:var(--radius-pill); padding:6px; box-shadow:var(--shadow-sm); position:sticky; top:85px; z-index:900; border:1px solid #f1f5f9; }
            .nav-btn { flex:1; padding:12px 5px; text-align:center; border:none; background:transparent; font-weight:800; font-size:0.9rem; color:var(--text-muted); cursor:pointer; border-radius:var(--radius-pill); }
            .nav-btn.active { background:var(--primary-grad); color:white; }
            .page { display:none; padding:0 10px; max-width:800px; margin:0 auto; }
            .page.active { display:block; }
            .modern-card { background:white; border-radius:var(--radius-md); padding:20px; margin-bottom:20px; box-shadow:var(--shadow-md); border:1px solid #edf2f7; }
            input[type="number"], input[type="tel"], input[type="time"], input[type="date"], input[type="text"], select { width:100%; padding:14px; font-size:1.1rem; text-align:center !important; font-weight:800; color:var(--text-dark); border:2px solid #e2e8f0; border-radius:12px; background:#f8fafc; font-family:'Sarabun', sans-serif; }
            input:focus, select:focus { border-color:var(--primary); outline:none; background:white; }
            .table-responsive { overflow-x:auto; border-radius:12px; border:1px solid #cbd5e1; }
            table { width:100%; border-collapse:collapse; min-width:600px; }
            th { background:#f8fafc; padding:10px; border:1px solid #e2e8f0; font-size:0.85rem; }
            td { padding:8px; border:1px solid #e2e8f0; text-align:center; font-weight:700; background:white; }
            .sack-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:15px; }
            .sack-item { background:#f8fafc; padding:10px; border-radius:10px; text-align:center; border:1px solid #e2e8f0; }
            .sack-item span { font-size:0.75rem; color:var(--text-muted); font-weight:bold; }
            .sack-val { font-size:1.1rem; font-weight:900; margin-top:4px; }
            .fab-container { position:fixed; bottom:30px; right:20px; z-index:2000; }
            .fab-main { width:65px; height:65px; border-radius:50%; background:var(--success-grad); color:white; border:none; font-size:36px; box-shadow:0 8px 25px rgba(16, 185, 129, 0.4); display:flex; align-items:center; justify-content:center; cursor:pointer;}
            .btn-action { width:100%; padding:16px; border:none; border-radius:14px; font-weight:900; color:white; cursor:pointer; margin-bottom:10px; font-size:1.1rem; }
            .btn-downtime { background:var(--danger-grad); }
            .btn-print { background:var(--purple-grad); margin-top:15px; }
            .modal { display:none; position:fixed; z-index:5000; left:0; top:0; width:100%; height:100%; background-color:rgba(15,23,42,0.6); backdrop-filter:blur(5px); align-items:center; justify-content:center; }
            #downtime_modal { z-index:6000 !important; }
            .modal-content { background-color:white; border-radius:var(--radius-lg); width:92%; max-width:500px; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; }
            .modal-header { display:flex; justify-content:space-between; align-items:center; padding:20px; border-bottom:1px solid #f1f5f9; }
            .btn-close-modal { background:#f1f5f9; color:#64748b; border:none; font-size:1.5rem; font-weight:bold; width:40px; height:40px; border-radius:50%; cursor:pointer; }
            .modal-body { overflow-y:auto; padding:20px; flex-grow:1; }
            .hist-item { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid #f1f5f9; cursor:pointer; }
            #print_area { display:none; }
        }
        @media print {
            @page { size: A4 portrait; margin: 8mm; }
            body > *:not(#print_area) { display: none !important; }
            #print_area { display: block !important; width: 100%; }
            .print-page { page-break-after: always; display: block; overflow: hidden; position: relative; }
            .print-page:last-child { page-break-after: auto; }
            .print-header { text-align: center; font-weight: 900; margin-bottom: 8px; font-size: 11pt; line-height: 1.2;}
            .print-wrapper { width: 100%; display: block; clear: both; overflow:hidden; }
            .print-left { float: left; width: 72.5%; }
            .print-right { float: right; width: 26.5%; border: 1px solid #475569; border-radius: 4px; padding: 8px 10px; box-sizing: border-box; background: white; }
            .print-table { width: 100%; border-collapse: collapse; border: 1.5px solid black; table-layout: fixed; }
            .print-table th { padding: 4px 1px; font-size: 8pt; font-weight: 800; border: 1px solid black; text-align: center; }
            .print-table td { height: 19px; font-size: 8.5pt; padding: 1px; line-height: 1; border: 1px solid black; text-align: center; font-weight:600;}
            .print-table td:nth-child(4), .print-table td:nth-child(5) { background-color: #e0f2fe !important; color: #0284c7 !important; }
            .print-table td:nth-child(6), .print-table td:nth-child(7), .print-table td:nth-child(8) { background-color: #dcfce7 !important; color: #15803d !important; }
            .print-table td:nth-child(9), .print-table td:nth-child(10) { background-color: #fef3c7 !important; color: #b45309 !important; }
            .print-footer td { background-color: #e2e8f0 !important; font-weight: 900; border-top: 1.5px solid black; color: black !important;}
            .s-title { margin-top: 6px; margin-bottom: 2px; font-weight: 900; border-bottom: 1px solid #475569; padding-bottom: 1px; font-size: 9pt; color: #1e293b;}
            .s-title:first-child { margin-top: 0; }
            .s-line { display: flex; justify-content: space-between; margin-bottom: 1px; border-bottom: 1px dotted #cbd5e1; font-size: 8.5pt;}
            .s-val { font-weight: 900; text-align: right; color: #0f172a;}
            .s-label { color: #475569; font-weight: 600; }
            .sign-box { margin-top: 10px; } 
            .sign-line { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 18px; font-size: 8.5pt; font-weight: bold;} 
            .sign-dots { flex-grow: 1; border-bottom: 1px dotted #64748b; margin: 0 4px; position: relative; top: -3px; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="dash-item"><span>🧊 หลอด</span><div id="dash_hl">0</div></div>
        <div class="dash-item"><span>🔨 หยาบ</span><div id="dash_bh">0</div></div>
        <div class="dash-item"><span>❄️ ละเอียด</span><div id="dash_bl">0</div></div>
    </div>
    
    <div class="order-status-bar">
        <div class="os-item">สั่งรวม: <span id="os_total">0</span></div>
        <div class="os-item">ส่งแล้ว: <span id="os_sent">0</span></div>
        <div class="os-item">ค้างส่ง: <b id="os_remain" style="color:#dc2626;">0</b></div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" id="btn-setup" onclick="switchPage('setup')">1. ตั้งค่า</button>
        <button class="nav-btn" id="btn-prod" onclick="switchPage('production')">2. ผลิต/จ่าย</button>
        <button class="nav-btn" id="btn-sum" onclick="switchPage('summary')">3. สรุปยอด</button>
    </div>

    <div id="page-setup" class="page active">
        <div class="modern-card">
            <h3 style="margin-top:0">⚙️ ตั้งค่าประจำวัน</h3>
            <input type="date" id="setup_date" onchange="changeDate()">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                <div><label style="font-size:0.7rem; font-weight:bold">🟢 เวลาเปิด</label><input type="time" id="time_start" value="22:00" onblur="saveData(); calcAll(); renderDrops();"></div>
                <div><label style="font-size:0.7rem; font-weight:bold">🔴 เวลาปิด (Auto)</label><input type="time" id="time_stop" disabled style="background:#e2e8f0"></div>
            </div>
        </div>
        <div class="modern-card">
            <h3 style="margin-top:0">📦 สต็อกยกมา</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <input type="tel" id="init_hl" value="0" oninput="updateStock()">
                <input type="tel" id="init_bh" value="0" oninput="updateStock()">
                <input type="tel" id="init_bl" value="0" oninput="updateStock()">
            </div>
        </div>
        <div class="modern-card">
            <h3 style="margin-top:0">🚚 สั่งซื้อ (Master Order)</h3>
            <div id="order_inputs" class="table-responsive"></div>
        </div>
        <button class="btn-action" style="background:#64748b" onclick="if(confirm('ล้างข้อมูลทั้งหมด?')){localStorage.clear(); location.reload();}">🗑️ รีเซ็ตข้อมูล</button>
    </div>

    <div id="page-production" class="page">
        <button class="btn-action btn-downtime" onclick="openDowntimeModal()">⚡ บันทึกไฟดับ / พักเครื่อง</button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <button class="btn-action" style="background:#d97706; font-size:1rem;" onclick="alert('ระบบจ่ายของเก่ากำลังพัฒนาเพิ่มเติม')">📦 จ่ายของเก่า</button>
            <button class="btn-action" style="background:#1e293b; font-size:1rem;" onclick="openFullHistory()">🕒 ประวัติย้อนหลัง</button>
        </div>
        <div id="drops_list"></div>
    </div>

    <div id="page-summary" class="page">
        <div class="modern-card" style="border:2px solid var(--primary);">
            <h3 style="margin-top:0; color:var(--primary);">📑 ข้อมูลรายงาน</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="text" id="rpt_ph" placeholder="pH" oninput="saveData()">
                <input type="text" id="rpt_tds" placeholder="TDS" oninput="saveData()">
            </div>
            <button class="btn-action btn-print" onclick="printReport()">🖨️ สร้างไฟล์ PDF</button>
        </div>
    </div>

    <div id="downtime_modal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="background:#fee2e2;">
                <div class="modal-title" style="color:#b91c1c;">⚡ บันทึกพักเครื่อง</div>
                <button class="btn-close-modal" style="background:white; color:#b91c1c;" onclick="closeDowntimeModal()">×</button>
            </div>
            <div class="modal-body">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <div><label style="font-weight:900; color:#b91c1c; text-align:center; display:block;">เวลาที่ดับ</label><input type="time" id="dt_start" style="color:#b91c1c; background:#fecaca;"></div>
                    <div><label style="font-weight:900; color:#15803d; text-align:center; display:block;">เวลาที่ติด (เปิด)</label><input type="time" id="dt_end" style="color:#15803d; background:#dcfce7;"></div>
                </div>
                <button class="btn-action" style="background:var(--danger-grad); margin-top:20px;" onclick="saveDowntime()">💾 บันทึกลงตาราง</button>
                <button id="btn_delete_dt" class="btn-action" style="background:transparent; color:#dc2626; border:2px solid #fca5a5; display:none;" onclick="deleteDowntime()">🗑️ ลบรายการนี้</button>
            </div>
        </div>
    </div>

    <div id="full_history_modal" class="modal">
        <div class="modal-content" style="height:90vh;">
            <div class="modal-header">
                <div class="modal-title">🕒 ประวัติย้อนหลัง</div>
                <button class="btn-close-modal" onclick="closeFullHistory()">×</button>
            </div>
            <div class="modal-body" style="background:#f8fafc; padding:10px;">
                <div class="history-list-wrapper" id="full_history_list"></div>
            </div>
        </div>
    </div>

    <div class="fab-container"><button class="fab-main" onclick="addDrop('prod')">+</button></div>
    <div id="print_area"></div>

<script>
    const TRUCKS = ["รถ 1", "รถ 2", "รถ 3", "รถ 4", "รถ 5", "รถ 6", "รถ 7", "รถ 8", "รถ 9"];
    let DATA = { times:{start:"22:00"}, initStock:{hl:0, bh:0, bl:0}, reportInfo:{ph:'7.1', tds:'172', branch:'วาริเทพเพ็ญ (W041)', machine:'M1', prodStaff:4, engStaff:1}, orders:{}, drops:[] };
    let EDITING_DOWNTIME_ID = null;
    let SOURCE_MODAL = null;

    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        const savedDate = localStorage.getItem('LAST_DATE') || today;
        document.getElementById('setup_date').value = savedDate;
        loadData(savedDate);
        renderOrderInputs();
        renderDrops();
        calcAll();
    });

    function getNum(v) { return parseFloat(v) || 0; }

    function saveData() { 
        const key = document.getElementById('setup_date').value;
        localStorage.setItem('LAST_DATE', key);
        DATA.times.start = document.getElementById('time_start').value;
        DATA.reportInfo.ph = document.getElementById('rpt_ph').value;
        DATA.reportInfo.tds = document.getElementById('rpt_tds').value;
        DATA.initStock = { hl:getNum(document.getElementById('init_hl').value), bh:getNum(document.getElementById('init_bh').value), bl:getNum(document.getElementById('init_bl').value) };
        localStorage.setItem(`ICE_DATA_${key}`, JSON.stringify(DATA)); 
    }

    function loadData(key) {
        const d = localStorage.getItem(`ICE_DATA_${key}`);
        if(d) DATA = JSON.parse(d);
        document.getElementById('rpt_ph').value = DATA.reportInfo.ph || '7.1';
        document.getElementById('rpt_tds').value = DATA.reportInfo.tds || '172';
        document.getElementById('time_start').value = DATA.times.start || '22:00';
        document.getElementById('init_hl').value = DATA.initStock.hl || 0;
        document.getElementById('init_bh').value = DATA.initStock.bh || 0;
        document.getElementById('init_bl').value = DATA.initStock.bl || 0;
    }

    function changeDate() { loadData(document.getElementById('setup_date').value); renderOrderInputs(); renderDrops(); calcAll(); }
    function updateStock() { saveData(); calcAll(); }

    function updateOrderValue(tid, type, val) {
        DATA.orders[`${tid}_${type}`] = getNum(val);
        saveData();
        document.getElementById(`sum_${tid}`).innerText = getNum(DATA.orders[`${tid}_hl`]) + getNum(DATA.orders[`${tid}_bh`]) + getNum(DATA.orders[`${tid}_bl`]);
        let tHL=0, tBH=0, tBL=0;
        TRUCKS.forEach((_, i) => { const id = `t${i+1}`; tHL += getNum(DATA.orders[`${id}_hl`]); tBH += getNum(DATA.orders[`${id}_bh`]); tBL += getNum(DATA.orders[`${id}_bl`]); });
        document.getElementById('f_hl').innerText = tHL; document.getElementById('f_bh').innerText = tBH; document.getElementById('f_bl').innerText = tBL; document.getElementById('f_total').innerText = tHL + tBH + tBL;
    }

    function renderOrderInputs() {
        const c = document.getElementById('order_inputs');
        let h = '<table><thead><tr><th>รถ</th><th>หลอด</th><th>หยาบ</th><th>ละเอียด</th><th>รวม</th></tr></thead><tbody>';
        let tHL=0, tBH=0, tBL=0;
        TRUCKS.forEach((t, i) => {
            const id = `t${i+1}`;
            const v1 = DATA.orders[`${id}_hl`]||0, v2 = DATA.orders[`${id}_bh`]||0, v3 = DATA.orders[`${id}_bl`]||0;
            tHL+=v1; tBH+=v2; tBL+=v3;
            h += `<tr><td>${t}</td>
                <td><input type="tel" value="${v1}" oninput="updateOrderValue('${id}','hl',this.value)"></td>
                <td><input type="tel" value="${v2}" oninput="updateOrderValue('${id}','bh',this.value)"></td>
                <td><input type="tel" value="${v3}" oninput="updateOrderValue('${id}','bl',this.value)"></td>
                <td id="sum_${id}" style="color:var(--primary); font-weight:900;">${v1+v2+v3}</td></tr>`;
        });
        h += `<tr style="background:#1e293b; color:white"><td style="background:#1e293b">รวม</td><td id="f_hl">${tHL}</td><td id="f_bh">${tBH}</td><td id="f_bl">${tBL}</td><td id="f_total">${tHL+tBH+tBL}</td></tr></tbody></table>`;
        c.innerHTML = h;
    }

    function openFullHistory() {
        const c = document.getElementById('full_history_list'); c.innerHTML = '';
        const startT = document.getElementById('time_start').value;
        const sorted = DATA.drops.slice().sort((a,b) => getAdjustedMinutes(b.time, startT) - getAdjustedMinutes(a.time, startT));
        
        sorted.forEach(d => {
            if(d.type === 'prod') {
                const sumP = getNum(d.p_in_room.hl) + getNum(d.p_in_room.bh) + getNum(d.p_in_room.bl);
                c.insertAdjacentHTML('beforeend', `<div class="hist-item"><div style="flex:1"><div class="hist-time">${d.time}</div><div class="hist-yield">ยอดผลิตรวม: <b style="color:var(--primary)">${sumP}</b> กระสอบ</div></div></div>`);
            } else {
                let diff = getMinDiff(d.time, d.time_end || d.time);
                c.insertAdjacentHTML('beforeend', `<div class="hist-item" style="background:#fef2f2; cursor:pointer;" onclick="openDowntimeModal(${d.id})">
                    <div style="flex:1"><div class="hist-time" style="color:#dc2626;">${d.time} - ${d.time_end||d.time}</div><div class="hist-yield" style="color:#ef4444;">หยุดเครื่อง/ไฟดับ (พัก ${diff} น.)</div></div>
                    <div style="font-size:1.5rem; color:#fca5a5;">›</div></div>`);
            }
        });
        document.getElementById('full_history_modal').style.display = 'flex';
    }

    function closeFullHistory() { document.getElementById('full_history_modal').style.display = 'none'; renderDrops(); calcAll(); }

    function openDowntimeModal(id = null) {
        EDITING_DOWNTIME_ID = id;
        if(id) {
            const d = DATA.drops.find(x => x.id === id);
            document.getElementById('dt_start').value = d.time; document.getElementById('dt_end').value = d.time_end || d.time;
        } else {
            const timeStr = new Date().toTimeString().substring(0, 5);
            document.getElementById('dt_start').value = timeStr; document.getElementById('dt_end').value = timeStr;
        }
        document.getElementById('btn_delete_dt').style.display = id ? 'block' : 'none';
        SOURCE_MODAL = (document.getElementById('full_history_modal').style.display === 'flex') ? 'full_history' : null;
        document.getElementById('downtime_modal').style.display = 'flex';
    }

    function closeDowntimeModal() { document.getElementById('downtime_modal').style.display = 'none'; if(SOURCE_MODAL === 'full_history') openFullHistory(); }

    function saveDowntime() {
        const tStart = document.getElementById('dt_start').value, tEnd = document.getElementById('dt_end').value;
        if(EDITING_DOWNTIME_ID) {
            const d = DATA.drops.find(x => x.id === EDITING_DOWNTIME_ID);
            if(d) { d.time = tStart; d.time_end = tEnd; }
        } else { DATA.drops.push({ id: Date.now(), type: 'downtime', time: tStart, time_end: tEnd }); }
        saveData(); calcAll(); closeDowntimeModal(); renderDrops();
    }

    function deleteDowntime() {
        if(confirm('ลบรายการไฟดับนี้?')) { DATA.drops = DATA.drops.filter(x => x.id !== EDITING_DOWNTIME_ID); saveData(); calcAll(); closeDowntimeModal(); renderDrops(); }
    }

    function updateDropVal(id, sub, val) {
        const d = DATA.drops.find(x => x.id === id); if(!d) return;
        d.p_in_room[sub] = getNum(val); saveData();
        let hlP = d.p_in_room.hl, bhP = d.p_in_room.bh, blP = d.p_in_room.bl;
        const wHL = Math.ceil(hlP/40)*40, wBOD = Math.ceil((bhP+blP)/40)*40;
        document.getElementById(`w_${id}`).innerText = `${wHL} / ${wBOD}`;
        document.getElementById(`u_${id}`).innerText = `${hlP} / ${bhP+blP}`;
        document.getElementById(`r_${id}`).innerHTML = `<div style="color:#15803d">หลอด:${wHL-hlP}</div><div style="color:#7c3aed">บด:${wBOD-(bhP+blP)}</div>`;
        calcAll();
    }

    function updateTimeBlur(id, newTime) {
        const d = DATA.drops.find(x => x.id === id);
        if(!d) return;
        if (d.time !== newTime) { d.time = newTime; saveData(); calcAll(); renderDrops(); }
    }

    function addDrop(type) {
        DATA.drops.push({ id:Date.now(), type, time:new Date().toTimeString().substring(0,5), p_in_room:{hl:0,bh:0,bl:0} });
        saveData(); renderDrops(); calcAll();
    }

    function renderDrops() {
        const c = document.getElementById('drops_list'); c.innerHTML = '';
        const startT = document.getElementById('time_start').value;
        const sortedDrops = DATA.drops.slice().sort((a, b) => getAdjustedMinutes(a.time, startT) - getAdjustedMinutes(b.time, startT));
        
        sortedDrops.slice().reverse().forEach(d => {
            if(d.type==='prod') {
                c.insertAdjacentHTML('beforeend', `<div class="modern-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #e2e8f0; padding-bottom:10px;">
                        <div style="display:flex; align-items:center; gap:10px;"><span style="font-size:1.5rem">🕒</span>
                        <input type="time" value="${d.time}" style="width:120px; font-size:1.4rem; padding:5px; border:none; background:transparent;" onblur="updateTimeBlur(${d.id}, this.value)"></div>
                        <button style="border:none; background:#fee2e2; color:red; border-radius:8px; padding:8px 15px; font-weight:bold; cursor:pointer;" onclick="deleteDrop(${d.id})">ลบตกลงนี้</button>
                    </div>
                    <div class="sack-row">
                        <div class="sack-item"><span>เบิก (หลอด/บด)</span><div class="sack-val" id="w_${d.id}">0/0</div></div>
                        <div class="sack-item"><span>ใช้ (หลอด/บด)</span><div class="sack-val" id="u_${d.id}">0/0</div></div>
                        <div class="sack-item"><span>คืน (หลอด/บด)</span><div id="r_${d.id}" style="font-size:0.75rem; font-weight:900; margin-top:4px;"></div></div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                        <div><label style="font-size:0.7rem; color:var(--text-muted); font-weight:bold; display:block; text-align:center;">หลอด</label><input type="tel" value="${d.p_in_room.hl}" oninput="updateDropVal(${d.id},'hl',this.value)"></div>
                        <div><label style="font-size:0.7rem; color:var(--text-muted); font-weight:bold; display:block; text-align:center;">หยาบ</label><input type="tel" value="${d.p_in_room.bh}" oninput="updateDropVal(${d.id},'bh',this.value)"></div>
                        <div><label style="font-size:0.7rem; color:var(--text-muted); font-weight:bold; display:block; text-align:center;">ละเอียด</label><input type="tel" value="${d.p_in_room.bl}" oninput="updateDropVal(${d.id},'bl',this.value)"></div>
                    </div>
                </div>`);
                updateDropVal(d.id, 'hl', d.p_in_room.hl);
            } else {
                c.insertAdjacentHTML('beforeend', `<div class="modern-card" style="border-left:6px solid #ef4444; background:#fef2f2; cursor:pointer;" onclick="openDowntimeModal(${d.id})">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-weight:900; color:#dc2626; font-size:1.1rem;">⚡ บันทึกพักเครื่อง</div>
                        <div style="color:#ef4444; font-weight:bold;">${d.time} - ${d.time_end||d.time}</div>
                    </div><div style="font-size:0.85rem; color:#991b1b; margin-top:5px;">คลิกเพื่อแก้ไขเวลา</div>
                </div>`);
            }
        });
    }

    function deleteDrop(id) { if(confirm("ต้องการลบจริงหรือไม่?")) { DATA.drops = DATA.drops.filter(x=>x.id!==id); saveData(); renderDrops(); calcAll(); } }

    function getAdjustedMinutes(timeStr, startStr) { 
        let [h, m] = timeStr.split(':').map(Number), [sh, sm] = startStr.split(':').map(Number); 
        let mins = h * 60 + m, sMins = sh * 60 + sm; 
        return (mins < sMins) ? mins + 1440 : mins; 
    }
    function getMinDiff(start, end) { 
        const mStart = getAdjustedMinutes(start, document.getElementById('time_start').value); 
        const mEnd = getAdjustedMinutes(end, document.getElementById('time_start').value); 
        return Math.max(0, mEnd - mStart); 
    }

    function calcAll() {
        let totalHL=0, totalBH=0, totalBL=0;
        DATA.drops.forEach(d => { if(d.type==='prod'){ totalHL+=d.p_in_room.hl; totalBH+=d.p_in_room.bh; totalBL+=d.p_in_room.bl; } });
        document.getElementById('dash_hl').innerText = totalHL;
        document.getElementById('dash_bh').innerText = totalBH;
        document.getElementById('dash_bl').innerText = totalBL;
    }

    function switchPage(p) { 
        document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); 
        document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.getElementById('btn-'+p.substring(0,3)).classList.add('active');
        if(p==='summary') calcAll();
    }

    function addMinutesToTime(timeStr, addMins) {
        if(!timeStr) return "00:00";
        let [h, m] = timeStr.split(':').map(Number);
        let date = new Date(); date.setHours(h, m + addMins, 0, 0);
        return String(date.getHours()).padStart(2,'0')+':'+String(date.getMinutes()).padStart(2,'0');
    }

    function printReport() {
        saveData();
        const startT = DATA.times.start;
        const sorted = DATA.drops.slice().sort((a,b) => getAdjustedMinutes(a.time, startT) - getAdjustedMinutes(b.time, startT));
        
        let rItems = [];
        sorted.forEach(d => {
            if(d.type==='prod') {
                const wHL = Math.ceil(d.p_in_room.hl/40)*40, wBOD = Math.ceil((d.p_in_room.bh+d.p_in_room.bl)/40)*40;
                
                let pTime = startT, idx = sorted.findIndex(x=>x.id===d.id);
                for(let i=idx-1; i>=0; i--) { if(sorted[i].type==='prod'){ pTime = sorted[i].time; break; } }
                let dSub = 0;
                for(let i=0; i<idx; i++) { if(sorted[i].type==='downtime' && getAdjustedMinutes(sorted[i].time, startT) >= getAdjustedMinutes(pTime, startT)) dSub += getMinDiff(sorted[i].time, sorted[i].time_end); }
                
                rItems.push({ type:'prod', time:d.time, diff: Math.max(0, getMinDiff(pTime, d.time)-dSub),
                    whl:wHL, wbod:wBOD, phl:d.p_in_room.hl, pbh:d.p_in_room.bh, pbl:d.p_in_room.bl,
                    rhl:wHL-d.p_in_room.hl, rbod:wBOD-(d.p_in_room.bh+d.p_in_room.bl)
                });
            } else {
                rItems.push({ type:'dt_start', time:d.time, diff: getMinDiff(d.time, d.time_end||d.time) });
                rItems.push({ type:'dt_end', time:d.time_end || d.time });
            }
        });

        const ROWS = 33;
        let finalHtml = '';
        let dStr = document.getElementById('setup_date').value.split('-');
        let mNames = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        let thDate = `${parseInt(dStr[2])} ${mNames[parseInt(dStr[1])-1]} ${parseInt(dStr[0])+543}`;

        for(let p=0; p < Math.ceil(rItems.length/ROWS) || p===0; p++) {
            let chunk = rItems.slice(p*ROWS, (p+1)*ROWS);
            let sHL=0, sBH=0, sBL=0, sWHL=0, sWBOD=0, sRHL=0, sRBOD=0, tDur=0, tCount=0;
            let openTime = startT;
            if(p>0 && rItems[p*ROWS - 1]) {
                openTime = rItems[p*ROWS - 1].type === 'dt_start' ? rItems[p*ROWS - 1].time : (rItems[p*ROWS - 1].time_end || rItems[p*ROWS - 1].time);
            }

            chunk.forEach(i => { if(i.type==='prod'){ sHL+=i.phl; sBH+=i.pbh; sBL+=i.pbl; sWHL+=i.whl; sWBOD+=i.wbod; sRHL+=i.rhl; sRBOD+=i.rbod; tDur+=i.diff; tCount++; } });
            
            let closeTime = addMinutesToTime(chunk[chunk.length-1]?.time || startT, 10);
            let footer = (p === Math.ceil(rItems.length/ROWS)-1) ? `รวม (ปิด ${closeTime} น.)` : "รวม";

            let pTotal = sHL+sBH+sBL;
            let avgTime = tCount>0 ? Math.round(tDur/tCount) : 0;
            let tWeight = (sHL*20)+(sBH*23)+(sBL*24);
            let tons = tDur>0 ? ((tWeight/tDur)*1440/1000).toFixed(2) : 0;
            let avgY = tCount>0 ? Math.round(pTotal/tCount) : 0;

            let pageHtml = `<div class="print-page">
                <div class="print-header">แบบฟอร์มบันทึกการผลิตน้ำแข็ง สาขา ${DATA.reportInfo.branch} เครื่องที่ ${DATA.reportInfo.machine}<br>ประจำวันที่ ${thDate} ${p>0?'(ต่อ)':''}</div>
                <div class="print-wrapper">
                    <div class="print-left">
                        <table class="print-table">
                            <thead><tr><th rowspan="2">ลำดับ</th><th rowspan="2">เวลา<br><span style="font-size:0.7rem">เปิด ${openTime} น.</span></th><th rowspan="2">นาที/<br>ตก</th><th colspan="2">เบิกกระสอบ</th><th colspan="3">ผลการผลิต</th><th colspan="2">กระสอบคงเหลือ</th></tr>
                            <tr><th>หลอด</th><th>บด</th><th>หลอดใหญ่</th><th>บดหยาบ</th><th>ละเอียด</th><th>หลอด</th><th>บด</th></tr></thead>
                            <tbody>`;
            
            let localCount = 0;
            for(let r=0; r<ROWS; r++) {
                let item = chunk[r];
                if(item) {
                    if(item.type==='prod') {
                        localCount++;
                        pageHtml += `<tr><td>${localCount}</td><td>${item.time}</td><td>${item.diff}</td><td>${item.whl||''}</td><td>${item.wbod||''}</td><td>${item.phl||''}</td><td>${item.pbh||''}</td><td>${item.pbl||''}</td><td>${item.rhl||''}</td><td>${item.rbod||''}</td></tr>`;
                    } else if(item.type==='dt_start') {
                        pageHtml += `<tr style="background:#fef2f2"><td></td><td>${item.time}</td><td></td><td colspan="7"><b>ปิดเครื่อง (พัก ${item.diff} น.)</b></td></tr>`;
                    } else {
                        pageHtml += `<tr style="background:#f0fdf4"><td></td><td>${item.time}</td><td></td><td colspan="7"><b>เปิดเครื่อง</b></td></tr>`;
                    }
                } else { pageHtml += `<tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`; }
            }

            pageHtml += `<tr class="print-footer"><td colspan="2">${footer}</td><td>${tDur}</td><td>${sWHL}</td><td>${sWBOD}</td><td>${sHL}</td><td>${sBH}</td><td>${sBL}</td><td>${sRHL}</td><td>${sRBOD}</td></tr>
                        </tbody></table></div>
                    <div class="print-right">
                        <div class="s-title" style="margin-top:0">ข้อมูลสรุป</div>
                        <div class="s-line"><span>หลอดใหญ่</span><span class="s-val">${sHL} กระสอบ</span></div>
                        <div class="s-line"><span>บดหยาบ</span><span class="s-val">${sBH} กระสอบ</span></div>
                        <div class="s-line"><span>บดละเอียด</span><span class="s-val">${sBL} กระสอบ</span></div>
                        <div class="s-line" style="border-bottom:none"><span>รวมผลิต</span><span class="s-val">${pTotal} กระสอบ</span></div>
                        
                        <div class="s-title">น้ำหนักเฉลี่ย</div>
                        <div class="s-line"><span>หลอดใหญ่</span><span class="s-val">20 กก.</span></div>
                        <div class="s-line"><span>บดหยาบ</span><span class="s-val">23 กก.</span></div>
                        <div class="s-line"><span>บดละเอียด</span><span class="s-val">24 กก.</span></div>
                        <div class="s-line" style="border-bottom:none"><span>รวม</span><span class="s-val">22 กก.</span></div>
                        
                        <div class="s-title">น้ำหนักรวม</div>
                        <div class="s-line"><span>หลอดใหญ่</span><span class="s-val">${(sHL*20).toLocaleString()} กก.</span></div>
                        <div class="s-line"><span>บดหยาบ</span><span class="s-val">${(sBH*23).toLocaleString()} กก.</span></div>
                        <div class="s-line"><span>บดละเอียด</span><span class="s-val">${(sBL*24).toLocaleString()} กก.</span></div>
                        <div class="s-line" style="border-bottom:none"><span>รวม</span><span class="s-val">${tWeight.toLocaleString()} กก.</span></div>
                        
                        <div class="s-title">สถิติการผลิต</div>
                        <div class="s-line"><span>เวลาเฉลี่ย</span><span class="s-val">${avgTime} นาที/ตก</span></div>
                        <div class="s-line"><span>กำลังผลิต</span><span class="s-val">${tons} ตัน/วัน</span></div>
                        <div class="s-line" style="border-bottom:none"><span>จำนวนเฉลี่ย</span><span class="s-val">${avgY} ใบ/ตก</span></div>
                        
                        <div class="s-title">สรุปกระสอบ</div>
                        <div class="s-line"><span>เบิกกระสอบรวม</span><span class="s-val">${sWHL+sWBOD} ใบ</span></div>
                        <div class="s-line"><span>กระสอบที่ใช้</span><span class="s-val">${pTotal} ใบ</span></div>
                        <div class="s-line" style="border-bottom:none"><span>คงเหลือจริง</span><span class="s-val">${sRHL+sRBOD} ใบ</span></div>
                        
                        <div class="s-title">ข้อมูลอื่นๆ</div>
                        <div class="s-line"><span>ค่า pH / TDS</span><span class="s-val">${DATA.reportInfo.ph} / ${DATA.reportInfo.tds}</span></div>
                        <div class="s-line" style="border-bottom:none"><span>พนักงาน / วิศวฯ</span><span class="s-val">${DATA.reportInfo.prodStaff} / ${DATA.reportInfo.engStaff} คน</span></div>
                        
                        <div class="sign-box">
                            <div class="sign-line">ลงชื่อ <span class="sign-dots"></span> วิศวกรรม</div>
                            <div class="sign-line">ลงชื่อ <span class="sign-dots"></span> ผู้จัดการสาขา</div>
                        </div>
                    </div>
                </div></div>`;
            finalHtml += pageHtml;
        }
        document.getElementById('print_area').innerHTML = finalHtml;
        window.print();
    }
</script>
</body>
</html>
